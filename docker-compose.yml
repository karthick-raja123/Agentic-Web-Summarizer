version: '3.8'

services:
  quickglance:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: quickglance-app
    
    ports:
      - "8501:8501"
    
    # Load environment variables from .env
    env_file:
      - .env
    
    # Environment variable overrides
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - LOG_LEVEL=INFO
    
    # Volume for logs persistence
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

