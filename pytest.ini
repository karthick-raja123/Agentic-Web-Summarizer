[pytest]
# Pytest Configuration

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    timeout: marks tests as timing out after N seconds
    parametrize: marks tests with parameters
    skip: skip test if condition met
    integration: integration tests
    unit: unit tests

# Timeout configuration
timeout = 300
timeout_method = thread

# Coverage
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.
